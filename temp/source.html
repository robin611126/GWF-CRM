<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GWF CRM Premium Login Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "accent-pink": "#ec4899",
                        "accent-orange": "#f97316",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0a0a16",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-[#0a0a16] via-[#1e1b4b] to-[#4c1d95]">
<!-- Decorative Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-primary/20 rounded-full blur-[80px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-80 h-80 bg-accent-pink/20 rounded-full blur-[100px]"></div>
<div class="w-full max-w-[400px] flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-12 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-primary to-accent-pink shadow-lg mb-4">
<span class="material-symbols-outlined text-white text-4xl">hub</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-white">GWF <span class="text-primary">CRM</span></h1>
<p class="text-slate-400 mt-2 text-sm font-medium">Enterprise Relationship Management</p>
</div>
<!-- Login Card -->
<div class="w-full backdrop-blur-xl bg-white/5 border border-white/10 rounded-xl p-8 shadow-2xl">
<div class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-400 ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl group-focus-within:text-primary">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-400">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl group-focus-within:text-primary">lock</span>
</div>
<input class="block w-full pl-12 pr-12 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center">
<button class="text-slate-500 hover:text-slate-300" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full py-4 px-6 bg-gradient-to-r from-accent-pink to-accent-orange hover:from-accent-pink/90 hover:to-accent-orange/90 text-white font-bold rounded-xl shadow-lg shadow-accent-pink/20 transition-all active:scale-[0.98] mt-4">
                        Sign In
                    </button>
</div>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/10"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="px-3 bg-transparent text-slate-500 font-semibold tracking-widest backdrop-blur-none">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold text-white">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-colors">
<svg class="w-5 h-5 text-white" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05 1.72-3.21 1.72-1.12 0-1.48-.68-2.78-.68-1.31 0-1.71.67-2.77.67-1.11 0-2.34-.84-3.37-2.04-2.12-2.52-3.73-7.14-1.54-10.95 1.08-1.89 3.03-3.09 5.15-3.09 1.62 0 3.15 1.12 4.14 1.12 1 0 2.84-1.35 4.77-1.15.82.03 3.1.33 4.57 2.47-.12.07-2.72 1.58-2.69 4.74.03 3.79 3.3 5.06 3.34 5.08-.03.09-.52 1.79-1.66 3.11zm-2.82-16.14c.88-1.07 1.48-2.56 1.32-4.04-1.27.05-2.81.85-3.72 1.91-.82.94-1.54 2.47-1.35 3.92 1.42.11 2.87-.72 3.75-1.79z"></path>
</svg>
<span class="text-sm font-semibold text-white">Apple</span>
</button>
</div>
</div>
<!-- Footer -->
<div class="mt-10 text-center">
<p class="text-slate-400 text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline" href="#">Start free trial</a>
</p>
</div>
</div>
</div>
</body></html>
