version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gwf-crm-db
    environment:
      POSTGRES_DB: gwf_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gwf-crm-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gwf_crm?schema=public
      JWT_SECRET: gwf-crm-production-jwt-secret-change-me
      JWT_REFRESH_SECRET: gwf-crm-production-refresh-secret-change-me
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      ENCRYPTION_KEY: gwf-crm-32char-encrypt-key-prod!!
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gwf-crm-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:5000/api

volumes:
  pgdata:
